# ESPHome config for Dreo DR-HTF007S Tower Fan
# Custom UART handler for extended Tuya MCU protocol (8-byte header)
# Hardware: WZ07-W (BL2028N/BK7231N) + CMS80F7518 MCU
# Protocol: 55 AA [ver] [seq] [cmd] [??] [len_hi] [len_lo] [data...] [checksum]
# Checksum = sum(all bytes before checksum) & 0xFF

esphome:
  name: dreo-dr-htf007s
  friendly_name: "Dreo Tower Fan"
  platformio_options:
    board_build.bkcrypt_coeffs: "00000000000000000000000000000000"
    board_build.bkota.key: "0123456789ABCDEF0123456789ABCDEF"
    board_build.bkota.iv: "0123456789ABCDEF"
    board_flash.calibration: "0x1E0000+0x1000"
    board_flash.download: "0x132000+0xAE000"

bk72xx:
  board: generic-bk7231n-qfn32-tuya

logger:
  level: DEBUG
  baud_rate: 0

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "DR-HTF007S Fallback"
    password: !secret fallback_ap_password
  power_save_mode: none

captive_portal:

web_server:
  port: 80

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

time:
  - platform: homeassistant
    id: ha_time

globals:
  - id: handshake_phase
    type: int
    restore_value: no
    initial_value: '0'

  - id: suppress_send
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: dp_queried
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: dp_id_out
    type: uint8_t
    restore_value: no
    initial_value: '0'

  - id: dp_type_out
    type: uint8_t
    restore_value: no
    initial_value: '0'

  - id: dp_val_out
    type: uint32_t
    restore_value: no
    initial_value: '0'

uart:
  - id: mcu_uart
    tx_pin: TX1
    rx_pin: RX1
    baud_rate: 115200
    rx_buffer_size: 512
    debug:
      direction: BOTH
      dummy_receiver: true
      after:
        bytes: 256
        timeout: 50ms
      sequence:
        - lambda: |-
            if (direction != uart::UART_DIRECTION_RX) return;

            int pos = 0;
            while (pos + 9 <= (int)bytes.size()) {
              if (bytes[pos] != 0x55 || bytes[pos + 1] != 0xAA) { pos++; continue; }
              if (pos + 8 > (int)bytes.size()) break;

              uint8_t cmd = bytes[pos + 4];
              uint16_t dlen = ((uint16_t)bytes[pos + 6] << 8) | bytes[pos + 7];
              int pkt_end = pos + 8 + dlen + 1;
              if (pkt_end > (int)bytes.size()) break;

              uint8_t csum = 0;
              for (int i = pos; i < pkt_end - 1; i++) csum += bytes[i];
              if (csum != bytes[pkt_end - 1]) {
                ESP_LOGW("tuya", "Checksum fail: calc=0x%02X got=0x%02X", csum, bytes[pkt_end - 1]);
                pos++; continue;
              }

              int ds = pos + 8;

              // --- Heartbeat response (cmd 0x00) ---
              if (cmd == 0x00) {
                if (id(handshake_phase) < 3) {
                  if (id(handshake_phase) == 0)
                    ESP_LOGI("tuya", "First heartbeat, starting handshake");
                  id(handshake_phase) = 1;
                  uint8_t ws[] = {0x55, 0xAA, 0x00, 0x00, 0x03, 0x00, 0x00, 0x01, 0x04, 0x07};
                  id(mcu_uart).write_array(ws, 10);
                } else {
                  ESP_LOGD("tuya", "Heartbeat OK (phase=%d)", id(handshake_phase));
                }
              }

              // --- Product info (cmd 0x01) ---
              else if (cmd == 0x01) {
                std::string info(bytes.begin() + ds, bytes.begin() + ds + dlen);
                ESP_LOGI("tuya", "Product info: %s", info.c_str());
                uint8_t ack[] = {0x55, 0xAA, 0x00, 0x00, 0x01, 0x00, 0x00, 0x00, 0x00};
                id(mcu_uart).write_array(ack, 9);
                // Send WiFi status after acking product info
                uint8_t ws[] = {0x55, 0xAA, 0x00, 0x00, 0x03, 0x00, 0x00, 0x01, 0x04, 0x07};
                id(mcu_uart).write_array(ws, 10);
                ESP_LOGI("tuya", "Sent WiFi status (connected)");
                if (id(handshake_phase) < 2) id(handshake_phase) = 2;
              }

              // --- MCU working mode (cmd 0x02) ---
              else if (cmd == 0x02) {
                ESP_LOGI("tuya", "MCU working mode received");
                uint8_t ack[] = {0x55, 0xAA, 0x00, 0x00, 0x02, 0x00, 0x00, 0x00, 0x01};
                id(mcu_uart).write_array(ack, 9);
              }

              // --- DP status report (cmd 0x07) ---
              else if (cmd == 0x07) {
                ESP_LOGI("tuya", "DP report (%d bytes)", dlen);
                id(suppress_send) = true;

                int dp = 0;
                while (dp + 4 <= (int)dlen) {
                  uint8_t did = bytes[ds + dp];
                  uint8_t dty = bytes[ds + dp + 1];
                  uint16_t dl = ((uint16_t)bytes[ds + dp + 2] << 8) | bytes[ds + dp + 3];
                  if (dp + 4 + dl > (int)dlen) break;

                  uint32_t val = 0;
                  if (dty == 0x01 && dl == 1)
                    val = bytes[ds + dp + 4];
                  else if (dty == 0x02 && dl == 4)
                    val = ((uint32_t)bytes[ds + dp + 4] << 24) | ((uint32_t)bytes[ds + dp + 5] << 16) |
                          ((uint32_t)bytes[ds + dp + 6] << 8) | bytes[ds + dp + 7];
                  else if (dty == 0x04 && dl == 1)
                    val = bytes[ds + dp + 4];

                  ESP_LOGD("tuya", "DP%d type=%d val=%d", did, dty, val);

                  switch (did) {
                    case 1: id(fan_power).publish_state(val != 0); break;
                    case 2: id(fan_led).publish_state(val != 0); break;
                    case 3: {
                      const char *m = nullptr;
                      if (val == 1) m = "Normal";
                      else if (val == 2) m = "Natural";
                      else if (val == 3) m = "Sleep";
                      else if (val == 4) m = "Auto";
                      if (m) id(fan_mode).publish_state(m);
                      break;
                    }
                    case 4:
                      if (val >= 1 && val <= 4) id(fan_speed).publish_state(std::to_string(val));
                      break;
                    case 5: id(fan_beeper).publish_state(val != 0); break;
                    case 6: id(timer_on).publish_state(val); break;
                    case 7: id(timer_off).publish_state(val); break;
                    case 8: id(fan_osc).publish_state(val != 0); break;
                    case 9: {
                      const char *f = "OK";
                      if (val == 1) f = "E1";
                      else if (val == 2) f = "EU";
                      else if (val > 0) f = "Unknown";
                      id(fan_fault).publish_state(f);
                      break;
                    }
                    case 11: id(temperature).publish_state(val); break;
                    case 12: id(temp_unit).publish_state(val == 0 ? "°C" : "°F"); break;
                    default: ESP_LOGD("tuya", "Unknown DP%d type=%d val=%d", did, dty, val); break;
                  }
                  dp += 4 + dl;
                }

                id(suppress_send) = false;
                if (id(handshake_phase) < 3) id(handshake_phase) = 3;
              }

              // --- WiFi status ack from MCU (cmd 0x03) ---
              else if (cmd == 0x03) {
                ESP_LOGD("tuya", "WiFi status ack");
                if (!id(dp_queried)) {
                  uint8_t q[] = {0x55, 0xAA, 0x00, 0x00, 0x08, 0x00, 0x00, 0x00, 0x07};
                  id(mcu_uart).write_array(q, 9);
                  id(dp_queried) = true;
                  ESP_LOGI("tuya", "Sent DP query");
                }
              }

              // --- Time sync request (cmd 0x0E) ---
              else if (cmd == 0x0E) {
                static uint32_t last_ts = 0;
                uint32_t tnow = millis();
                // Log full raw packet header + data (rate limited)
                if (tnow - last_ts > 2000) {
                  std::string pktdump;
                  char hbuf[4];
                  for (int i = pos; i < pkt_end && i < pos + 20; i++) {
                    snprintf(hbuf, sizeof(hbuf), "%02X ", bytes[i]);
                    pktdump += hbuf;
                  }
                  ESP_LOGI("tuya", "Time req raw: %s", pktdump.c_str());
                }
                auto now = id(ha_time).now();
                if (now.is_valid() && tnow - last_ts > 500) {
                  last_ts = tnow;
                  uint8_t dow = now.day_of_week;
                  if (dow == 1) dow = 7; else dow -= 1;
                  uint8_t tr[] = {0x55, 0xAA, 0x00, 0x00, 0x0E, 0x00, 0x00, 0x08,
                    0x01, (uint8_t)(now.year % 100), (uint8_t)now.month, (uint8_t)now.day_of_month,
                    (uint8_t)now.hour, (uint8_t)now.minute, (uint8_t)now.second, dow, 0x00};
                  uint8_t s = 0;
                  for (int i = 0; i < 16; i++) s += tr[i];
                  tr[16] = s;
                  id(mcu_uart).write_array(tr, 17);
                  ESP_LOGI("tuya", "Sent time: %02d-%02d-%02d %02d:%02d:%02d dow=%d",
                    now.year % 100, now.month, now.day_of_month, now.hour, now.minute, now.second, dow);
                }
              }

              // --- WiFi reset request (cmd 0x04/0x05) ---
              else if (cmd == 0x04 || cmd == 0x05) {
                ESP_LOGW("tuya", "WiFi reset (cmd 0x%02X) — entering safe mode AP", cmd);
                uint8_t ws[] = {0x55, 0xAA, 0x00, 0x00, 0x03, 0x00, 0x00, 0x01, 0x01, 0x00};
                uint8_t s = 0; for (int i = 0; i < 9; i++) s += ws[i]; ws[9] = s;
                id(mcu_uart).write_array(ws, 10);
                App.safe_reboot();
              }

              else {
                std::string hex;
                char buf[4];
                for (int i = 0; i < (int)dlen && i < 16; i++) {
                  snprintf(buf, sizeof(buf), "%02X ", bytes[ds + i]);
                  hex += buf;
                }
                ESP_LOGD("tuya", "Cmd 0x%02X len=%d data=%s", cmd, dlen, hex.c_str());
              }

              pos = pkt_end;
            }

interval:
  - interval: 1s
    then:
      - lambda: |-
          static uint32_t last_hb = 0;
          uint32_t now = millis();
          int phase = id(handshake_phase);

          // Heartbeat: 3s during handshake, 15s when operational
          uint32_t hb_ms = phase >= 3 ? 15000 : 3000;
          if (now - last_hb >= hb_ms) {
            uint8_t hb[] = {0x55, 0xAA, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0xFF};
            id(mcu_uart).write_array(hb, 9);
            last_hb = now;
          }

          // Send WiFi status to MCU every 30s
          static uint32_t last_ws = 0;
          if (phase >= 3 && now - last_ws >= 30000) {
            bool connected = wifi::global_wifi_component->is_connected();
            uint8_t status = connected ? 0x04 : 0x02;
            uint8_t ws[] = {0x55, 0xAA, 0x00, 0x00, 0x03, 0x00, 0x00, 0x01, status, 0x00};
            uint8_t s = 0; for (int i = 0; i < 9; i++) s += ws[i]; ws[9] = s;
            id(mcu_uart).write_array(ws, 10);
            last_ws = now;
          }

          // Fallback DP query if ack-triggered one didn't fire
          if (phase >= 1 && !id(dp_queried) && now > 15000) {
            uint8_t q[] = {0x55, 0xAA, 0x00, 0x00, 0x08, 0x00, 0x00, 0x00, 0x07};
            id(mcu_uart).write_array(q, 9);
            id(dp_queried) = true;
            ESP_LOGI("tuya", "Fallback DP query");
          }

script:
  - id: send_dp_cmd
    mode: single
    then:
      - lambda: |-
          if (id(suppress_send)) return;
          uint8_t did = id(dp_id_out);
          uint8_t dty = id(dp_type_out);
          uint32_t val = id(dp_val_out);

          std::vector<uint8_t> p = {0x55, 0xAA, 0x00, 0x00, 0x06, 0x00, 0x00, 0x00};
          p.push_back(did);
          p.push_back(dty);
          if (dty == 0x02) {
            p.push_back(0x00); p.push_back(0x04);
            p.push_back((val >> 24) & 0xFF);
            p.push_back((val >> 16) & 0xFF);
            p.push_back((val >> 8) & 0xFF);
            p.push_back(val & 0xFF);
            p[7] = 0x08;
          } else {
            p.push_back(0x00); p.push_back(0x01);
            p.push_back(val & 0xFF);
            p[7] = 0x05;
          }
          uint8_t s = 0;
          for (uint8_t b : p) s += b;
          p.push_back(s);
          id(mcu_uart).write_array(p.data(), p.size());
          ESP_LOGD("tuya_tx", "DP%d type=%d val=%d", did, dty, val);

switch:
  - platform: template
    name: "Power"
    id: fan_power
    icon: "mdi:power"
    optimistic: true
    turn_on_action:
      - lambda: 'id(dp_id_out)=1; id(dp_type_out)=0x01; id(dp_val_out)=1;'
      - script.execute: send_dp_cmd
    turn_off_action:
      - lambda: 'id(dp_id_out)=1; id(dp_type_out)=0x01; id(dp_val_out)=0;'
      - script.execute: send_dp_cmd

  - platform: template
    name: "LED"
    id: fan_led
    icon: "mdi:led-on"
    entity_category: config
    optimistic: true
    turn_on_action:
      - lambda: 'id(dp_id_out)=2; id(dp_type_out)=0x01; id(dp_val_out)=1;'
      - script.execute: send_dp_cmd
    turn_off_action:
      - lambda: 'id(dp_id_out)=2; id(dp_type_out)=0x01; id(dp_val_out)=0;'
      - script.execute: send_dp_cmd

  - platform: template
    name: "Beeper"
    id: fan_beeper
    icon: "mdi:volume-high"
    entity_category: config
    optimistic: true
    turn_on_action:
      - lambda: 'id(dp_id_out)=5; id(dp_type_out)=0x01; id(dp_val_out)=1;'
      - script.execute: send_dp_cmd
    turn_off_action:
      - lambda: 'id(dp_id_out)=5; id(dp_type_out)=0x01; id(dp_val_out)=0;'
      - script.execute: send_dp_cmd

  - platform: template
    name: "Oscillation"
    id: fan_osc
    icon: "mdi:arrow-oscillating"
    optimistic: true
    turn_on_action:
      - lambda: 'id(dp_id_out)=8; id(dp_type_out)=0x01; id(dp_val_out)=1;'
      - script.execute: send_dp_cmd
    turn_off_action:
      - lambda: 'id(dp_id_out)=8; id(dp_type_out)=0x01; id(dp_val_out)=0;'
      - script.execute: send_dp_cmd

select:
  - platform: template
    name: "Mode"
    id: fan_mode
    icon: "mdi:fan"
    options:
      - "Normal"
      - "Natural"
      - "Sleep"
      - "Auto"
    optimistic: true
    set_action:
      - lambda: |-
          id(dp_id_out) = 3;
          id(dp_type_out) = 0x04;
          if (x == "Normal") id(dp_val_out) = 1;
          else if (x == "Natural") id(dp_val_out) = 2;
          else if (x == "Sleep") id(dp_val_out) = 3;
          else if (x == "Auto") id(dp_val_out) = 4;
      - script.execute: send_dp_cmd

  - platform: template
    name: "Speed"
    id: fan_speed
    icon: "mdi:speedometer"
    options:
      - "1"
      - "2"
      - "3"
      - "4"
    optimistic: true
    set_action:
      - lambda: |-
          id(dp_id_out) = 4;
          id(dp_type_out) = 0x04;
          id(dp_val_out) = atoi(x.c_str());
      - script.execute: send_dp_cmd

number:
  - platform: template
    name: "Timer On"
    id: timer_on
    icon: "mdi:timer"
    min_value: 0
    max_value: 480
    step: 60
    unit_of_measurement: "min"
    optimistic: true
    set_action:
      - lambda: 'id(dp_id_out)=6; id(dp_type_out)=0x02; id(dp_val_out)=(uint32_t)x;'
      - script.execute: send_dp_cmd

  - platform: template
    name: "Timer Off"
    id: timer_off
    icon: "mdi:timer-off"
    min_value: 0
    max_value: 480
    step: 60
    unit_of_measurement: "min"
    optimistic: true
    set_action:
      - lambda: 'id(dp_id_out)=7; id(dp_type_out)=0x02; id(dp_val_out)=(uint32_t)x;'
      - script.execute: send_dp_cmd

sensor:
  - platform: template
    name: "Temperature"
    id: temperature
    unit_of_measurement: "°F"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 0

  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s
    entity_category: diagnostic

  - platform: uptime
    name: "Uptime"
    entity_category: diagnostic

text_sensor:
  - platform: template
    name: "Fault"
    id: fan_fault
    icon: "mdi:alert-circle"
    entity_category: diagnostic

  - platform: template
    name: "Temperature Unit"
    id: temp_unit
    icon: "mdi:thermometer"
    entity_category: diagnostic

button:
  - platform: restart
    name: "Restart"
    entity_category: diagnostic

  - platform: template
    name: "Query DPs"
    entity_category: diagnostic
    on_press:
      - lambda: |-
          uint8_t q[] = {0x55, 0xAA, 0x00, 0x00, 0x08, 0x00, 0x00, 0x00, 0x07};
          id(mcu_uart).write_array(q, 9);
          ESP_LOGI("tuya", "Manual DP query sent");

