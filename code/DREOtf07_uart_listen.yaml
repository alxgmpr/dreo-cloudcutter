# Pure passive listener - NO TX, just capture whatever the MCU sends after OTA reboot

esphome:
  name: dreo-dreotf07
  friendly_name: "Dreo Tower Fan"
  platformio_options:
    board_build.bkcrypt_coeffs: "00000000000000000000000000000000"
    board_build.bkota.key: "0123456789ABCDEF0123456789ABCDEF"
    board_build.bkota.iv: "0123456789ABCDEF"
    board_flash.calibration: "0x1E0000+0x1000"
    board_flash.download: "0x132000+0xAE000"

bk72xx:
  board: generic-bk7231n-qfn32-tuya

logger:
  level: DEBUG
  baud_rate: 0

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "DREOtf07 Fallback"
    password: !secret fallback_ap_password
  power_save_mode: none

captive_portal:

web_server:
  port: 80

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

uart:
  - id: mcu_uart
    tx_pin: TX1
    rx_pin: RX1
    baud_rate: 115200
    debug:
      direction: BOTH
      dummy_receiver: true
      after:
        bytes: 128
        timeout: 500ms

sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s
    entity_category: diagnostic
  - platform: uptime
    name: "Uptime"
    entity_category: diagnostic

button:
  - platform: restart
    name: "Restart"
    entity_category: diagnostic
