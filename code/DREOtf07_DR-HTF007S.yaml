# ESPHome config for Dreo DREOtf07 / DR-HTF007S Tower Fan
#
# Hardware: WZ07-W (BL2028N/BK7231N) + CMS80F7518 MCU
# Protocol: Standard Tuya MCU (55 AA) at 115200 8N1
# Flash via /module HTTP endpoint (put fan in pairing mode first)

esphome:
  name: dreo-dreotf07
  friendly_name: "Dreo Tower Fan"
  platformio_options:
    board_build.bkcrypt_coeffs: "00000000000000000000000000000000"
    board_build.bkota.key: "0123456789ABCDEF0123456789ABCDEF"
    board_build.bkota.iv: "0123456789ABCDEF"
    board_flash.calibration: "0x1E0000+0x1000"
    board_flash.download: "0x132000+0xAE000"

bk72xx:
  board: generic-bk7231n-qfn32-tuya

logger:
  level: DEBUG
  hardware_uart: UART2

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "DREOtf07 Fallback"
    password: !secret fallback_ap_password
  power_save_mode: none

captive_portal:

web_server:
  port: 80

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

uart:
  tx_pin: TX1
  rx_pin: RX1
  baud_rate: 115200

tuya:
  time_id: homeassistant_time

time:
  - platform: homeassistant
    id: homeassistant_time

# --- Fan ---
# DP 1 = power, DP 4 = speed (enum 1-4), DP 8 = oscillation
fan:
  - platform: tuya
    name: "Fan"
    switch_datapoint: 1
    speed_datapoint: 4
    speed_count: 4
    oscillation_datapoint: 8

# --- Fan Mode ---
# DP 3 = windtype (enum: 1=normal, 2=natural, 3=sleep, 4=auto)
select:
  - platform: tuya
    name: "Fan Mode"
    enum_datapoint: 3
    options:
      1: "Normal"
      2: "Natural"
      3: "Sleep"
      4: "Auto"

  - platform: tuya
    name: "Temperature Unit"
    enum_datapoint: 18
    options:
      0: "Celsius"
      1: "Fahrenheit"
    entity_category: config

# --- Switches ---
switch:
  - platform: tuya
    name: "LED"
    switch_datapoint: 2

  - platform: tuya
    name: "Beeper"
    switch_datapoint: 5

# --- Timers ---
number:
  - platform: tuya
    name: "Timer On"
    number_datapoint: 6
    min_value: 0
    max_value: 1440
    step: 1
    unit_of_measurement: "min"

  - platform: tuya
    name: "Timer Off"
    number_datapoint: 7
    min_value: 0
    max_value: 1440
    step: 1
    unit_of_measurement: "min"

# --- Sensors ---
sensor:
  - platform: tuya
    name: "Temperature"
    sensor_datapoint: 11
    unit_of_measurement: "°F"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 0

  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s
    entity_category: diagnostic

  - platform: uptime
    name: "Uptime"
    entity_category: diagnostic

# --- Diagnostics ---
# Unknown DPs — monitor these in HA logs to discover their function
  - platform: tuya
    name: "Unknown DP 9"
    sensor_datapoint: 9
    entity_category: diagnostic

  - platform: tuya
    name: "Unknown DP 12"
    sensor_datapoint: 12
    entity_category: diagnostic

button:
  - platform: restart
    name: "Restart"
    entity_category: diagnostic
