# =============================================================================
# ESPHome config for Dreo DREOtf07 / DR-HTF007S Tower Fan
# =============================================================================
#
# Hardware:
#   WiFi module:  WZ07-W (MBL01), BL2028N (BK7231N clone)
#   MCU:          CMS80F7518 (8051 core)
#   UART:         115200 8N1, TX1/RX1
#   Protocol:     Standard Tuya MCU (55 AA framing)
#
# This config uses ESPHome's native `tuya` component — no custom UART lambdas
# needed because the DREOtf07 speaks standard Tuya MCU protocol (unlike the
# DR-HTF004S which uses a proprietary AA xx FA framing).
#
# Tuya Datapoint Map (from firmware + live capture):
#   DP  1  poweron       Bool   Fan power on/off
#   DP  2  ledalwayson   Bool   LED always on
#   DP  3  windtype      Enum   Fan mode (1=normal, 2=natural, 3=sleep, 4=auto)
#   DP  4  windlevel     Enum   Fan speed (1-4)
#   DP  5  voiceon       Bool   Beeper on/off
#   DP  6  timeron       Value  Timer on duration
#   DP  7  timeroff      Value  Timer off duration
#   DP  8  shakehorizon  Bool   Horizontal oscillation on/off
#   DP  9  (unknown)     Enum   Unknown
#   DP 11  temperature   Value  Ambient temperature (deg F)
#   DP 12  (unknown)     Enum   Unknown
#   DP 18  tempunit      Int    Temperature unit
#
# OTA flashing via /module HTTP endpoint or cloudcutter.
# =============================================================================

esphome:
  name: dreo-dreotf07
  friendly_name: "Dreo Tower Fan (DREOtf07)"
  platformio_options:
    board_build.bkcrypt_coeffs: "00000000000000000000000000000000"
    board_build.bkota.key: "0123456789ABCDEF0123456789ABCDEF"
    board_build.bkota.iv: "0123456789ABCDEF"
    board_flash.calibration: "0x1E0000+0x1000"
    board_flash.download: "0x132000+0xAE000"

bk72xx:
  board: generic-bk7231n-qfn32-tuya

# Enable logging
logger:
  level: DEBUG
  baud_rate: 0  # Disable logger on hardware UART — it conflicts with Tuya MCU

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # Optional: uncomment and set for static IP
  # manual_ip:
  #   static_ip: 192.168.1.XXX
  #   gateway: 192.168.1.1
  #   subnet: 255.255.255.0
  ap:
    ssid: "DREOtf07 Fallback"
    password: !secret fallback_ap_password
  power_save_mode: none

captive_portal:

web_server:
  port: 80

# Home Assistant API
api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

# --- UART & Tuya MCU ---
# The CMS80F7518 MCU communicates via standard Tuya protocol at 115200 baud.
# ESPHome's tuya component handles the full protocol: heartbeats, product info
# queries, DP status reports, and DP commands — all automatically.
uart:
  tx_pin: TX1
  rx_pin: RX1
  baud_rate: 115200

tuya:
  # The tuya component auto-discovers DPs and handles the Tuya MCU protocol.
  # time_id below syncs the MCU clock (it requests time via cmd 0x1C).
  time_id: homeassistant_time

time:
  - platform: homeassistant
    id: homeassistant_time

# =============================================================================
# Fan entity — maps to DP 1 (power), DP 4 (speed), DP 8 (oscillation)
# =============================================================================
fan:
  - platform: tuya
    name: "Fan"
    switch_datapoint: 1        # poweron (Bool)
    speed_datapoint: 4         # windlevel (Enum: 1-4)
    speed_count: 4             # 4 discrete speed levels
    oscillation_datapoint: 8   # shakehorizon (Bool)

# =============================================================================
# Selects — for fan mode and other multi-option controls
# =============================================================================
select:
  - platform: tuya
    name: "Fan Mode"
    datapoint: 3               # windtype (Enum)
    options:
      0: "Off"
      1: "Normal"
      2: "Natural"
      3: "Sleep"
      4: "Auto"
    # Note: verify actual enum values — boot capture shows DP 3 = 1 for normal.
    # The mapping above matches the firmware attribute table. If the MCU sends
    # values you don't expect, check ESPHome logs for "Tuya Datapoint" entries.

# =============================================================================
# Switches — simple boolean controls
# =============================================================================
switch:
  - platform: tuya
    name: "LED Always On"
    datapoint: 2               # ledalwayson (Bool)

  - platform: tuya
    name: "Beeper"
    datapoint: 5               # voiceon (Bool)

# =============================================================================
# Numbers — timer controls
# =============================================================================
number:
  - platform: tuya
    name: "Timer On"
    datapoint: 6               # timeron (Value)
    min_value: 0
    max_value: 1440            # Adjust max based on testing (likely minutes)
    step: 1
    unit_of_measurement: "min"

  - platform: tuya
    name: "Timer Off"
    datapoint: 7               # timeroff (Value)
    min_value: 0
    max_value: 1440
    step: 1
    unit_of_measurement: "min"

# =============================================================================
# Sensors — read-only values from the MCU
# =============================================================================
sensor:
  - platform: tuya
    name: "Temperature"
    datapoint: 11              # temperature (Value, deg F from MCU)
    unit_of_measurement: "°F"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 0
    filters:
      # Uncomment below to convert to Celsius for display:
      # - lambda: return (x - 32.0) * (5.0 / 9.0);
      # Then change unit_of_measurement to "°C" and accuracy_decimals to 1
      []

  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s

# =============================================================================
# Diagnostics — unknown DPs to monitor during initial testing
# =============================================================================
# Uncomment these to expose unknown DPs in Home Assistant for discovery:
#
# sensor:
#   - platform: tuya
#     name: "Unknown DP 9"
#     datapoint: 9
#
#   - platform: tuya
#     name: "Unknown DP 12"
#     datapoint: 12
#
# number:
#   - platform: tuya
#     name: "Temperature Unit (DP 18)"
#     datapoint: 18
#     min_value: 0
#     max_value: 1
#     step: 1

# =============================================================================
# Status LED — optional, uses the onboard WiFi module LED if available
# =============================================================================
# status_led:
#   pin:
#     number: P8    # Check actual pin for your module
#     inverted: true

# =============================================================================
# Restart button for diagnostics
# =============================================================================
button:
  - platform: restart
    name: "Restart"
    entity_category: diagnostic
